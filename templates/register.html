<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-register-style.css') }}">
    <title>Register Your Profile - Pantry</title>
</head>
<body>

    <main class="login-register-container">
        <section class="login-register-card">
            <img src="{{ url_for('static', filename='img/pantry-icon.svg') }}" alt="Pantry logo">
            <h1>Register Your Profile</h1>
            <form action="{{ url_for('register') }}" method="POST">
                {{ form.hidden_tag() }}
                <div class="field">
                    <label for="first_name">First Name:</label>
                    <input type="text" name="first_name" placeholder="First Name" required>
                </div>
                <div class="field">
                    <label for="last_name">Last Name:</label>
                    <input type="text" name="last_name" placeholder="Last Name" required>
                </div>
                <div class="field">
                    <label for="email">Email Address:</label>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="field">
                    <label for="password">Password:</label>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <div class="field">
                    <label for="confirm_password">Confirm Password:</label>
                    <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                </div>
                <button class="login-register-btn" type="submit">Register</button>
            </form>
            <p class="login-register-link">Already have an account? <a href="{{ url_for('login') }}">Log in here</a>.</p>
        </section>
    </main>
    
</body>
</html>
