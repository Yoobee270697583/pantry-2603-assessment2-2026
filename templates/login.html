<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-register-style.css') }}">
    <title>Login - Pantry</title>
</head>
<body>
    
    <main class="login-container">
        <section class="login-card">
            <img src="{{ url_for('static', filename='img/pantry-icon.svg') }}" alt="Pantry logo">
            <h1>Pantry</h1>
            <p class="tagline">Use More. Waste Less.</p>
            <form action="{{ url_for('kitchen') }}" method="POST">
                <div class="field">
                    <label for="username">Email:</label>
                    <input type="email" name="username" placeholder="youremail@example.com" required>
                </div>
                <div class="field">
                    <label for="password">Password:</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button class="login-btn" type="submit">Log In</button>
            </form>
            <p class="register-link">Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>.</p>
        </section>
    </main>
    
</body>
</html>
